              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(165 50 50)"/>

      </header>

      <main id="home" class="hero-section">
        <div class="chat-container-main fade-in">
          <div class="chat-welcome" id="chat-welcome">
            <h1 class="welcome-title" id="dynamic-greeting">What can I help with?</h1>
            <p class="welcome-subtitle" id="dynamic-subtitle">Understand the election process, timelines &amp; steps — ask in any language 🇮🇳</p>
          </div>

          <div class="chat-messages" id="chat-messages">
            <!-- Messages will appear here -->
          </div>
          
          <div class="ai-input-wrapper">
            <div class="input-container-floating" id="input-pill">
              <div class="input-actions-left">
                <button id="new-chat-plus" class="action-btn plus-btn" onclick="clearChat()" title="New Chat" aria-label="New Chat">
                  <svg viewBox="0 0 24 24" width="22" height="22">
                    <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"></path>
                  </svg>
                </button>
              </div>
              <textarea id="user-input" placeholder="Ask about elections, voting, timelines..." rows="1"></textarea>
              <div class="input-actions-right">
                <button id="mic-btn" class="action-btn mic-btn" aria-label="Voice Input" title="Speak your question">
                  <svg viewBox="0 0 24 24" width="18" height="18">
                    <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"></path>
                    <path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"></path>
                  </svg>
                </button>
                <button id="send-msg" class="send-btn-round" aria-label="Send Message">
                  <svg viewBox="0 0 24 24" width="22" height="22">
                    <path fill="currentColor" d="M12 3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2s2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 4c-1.1 0-2 .9-2 2v6c0 1.1.9 2 2 2s2-.9 2-2V9c0-1.1-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2v6c0 1.1.9 2 2 2s2-.9 2-2V9c0-1.1-.9-2-2-2z"></path>
                  </svg>
                </button>
              </div>
            </div>
            
            <div class="welcome-suggestions-row" id="initial-suggestions">
              <button class="suggestion-card" onclick="askChip('Explain the complete Indian election process step by step')">
                <span class="card-icon">🏛️</span>
                <div class="card-text">
                  <strong>How Elections Work</strong>
                  <p>Complete process explained</p>
                </div>
              </button>
              <button class="suggestion-card" onclick="askChip('What is the timeline of a General Election in India from announcement to result?')">
                <span class="card-icon">🗓️</span>
                <div class="card-text">
                  <strong>Election Timeline</strong>
                  <p>Announcement to result</p>
                </div>
              </button>
              <button class="suggestion-card" onclick="askChip('How do I register to vote?')">
                <span class="card-icon">🗳️</span>
                <div class="card-text">
                  <strong>Register to Vote</strong>
                  <p>Step-by-step guide</p>
                </div>
              </button>
              <button class="suggestion-card" onclick="askChip('What is Form 6 and how to fill it?')">
                <span class="card-icon">📋</span>
                <div class="card-text">
                  <strong>Form 6 Guide</strong>
                  <p>New voter application</p>
                </div>
              </button>
              <button class="suggestion-card" onclick="askChip('How to find my polling booth?')">
                <span class="card-icon">📍</span>
                <div class="card-text">
                  <strong>Find My Booth</strong>
                  <p>Locate polling station</p>
                </div>
              </button>
              <button class="suggestion-card" onclick="askChip('What valid IDs can I use to vote?')">
                <span class="card-icon">🪪</span>
                <div class="card-text">
                  <strong>Valid IDs to Vote</strong>
                  <p>12 accepted documents</p>
                </div>
              </button>
            </div>

            <div class="input-footer-minimal">
              <span>Verified by Election Commission of India · Ask in Hindi, Bengali, Tamil or any language</span>
            </div>
          </div>
        </div>

        <div id="record-overlay" class="record-overlay hidden">
          <div class="record-content">
            <div class="record-pulse"></div>
            <p>Listening...</p>
            <button id="stop-record" class="stop-record-btn">Done</button>
          </div>
        </div>
      </main>


      <footer class="footer">
        <div class="footer-content">
          <p>© 2026 ElectAI — Built with Google Gemini for Bharat's Democracy</p>
        </div>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="/main.js"></script>
    <script>
      if (!localStorage.getItem('electai_session_id')) {
        localStorage.setItem('electai_session_id', 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9));
      }
      const SESSION_ID = localStorage.getItem('electai_session_id');

      window.askJanMat = async function(prompt) {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Session-Id': SESSION_ID },
          body: JSON.stringify({ prompt }),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Network error');
        return data.response;
      };

      if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
        document.addEventListener('focusin', (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
            document.body.classList.add('keyboard-open');
          }
        });
        document.addEventListener('focusout', (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
            document.body.classList.remove('keyboard-open');
          }
        });
      }
    </script>
  </body>
</html>
