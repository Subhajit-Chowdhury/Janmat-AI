<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ElectAI | Premium Indian Election Guide</title>
    <meta name="description" content="ElectAI — Your premium, AI-powered companion for Indian Elections. Real-time verified information grounded by Google Search and the ECI.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./ui.css">
  </head>
  <body>    <div id="app">
      <header class="navbar" role="banner">
        <a href="/" class="logo" aria-label="ElectAI Home">
          <svg class="ashoka-chakra" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="50" cy="50" r="45" fill="white" stroke="#3b82f6" stroke-width="2"/>
            <circle cx="50" cy="50" r="6" fill="#000080"/>
            <g id="spokes">
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(0 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(15 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(30 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(45 50 50)"/>

              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(90 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(105 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(120 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(135 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(150 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(165 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(180 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(195 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(210 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(225 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(240 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(255 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(270 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(285 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(300 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(315 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(330 50 50)"/>
              <line x1="50" y1="5" x2="50" y2="50" stroke="#000080" stroke-width="2.5" transform="rotate(345 50 50)"/>
            </g>
          </svg>
          Elect<span>AI</span>
        </a>
        <div class="nav-actions">
          <select id="lang-switcher" class="lang-select" aria-label="Switch interface language">
            <option value="en" selected>English</option>
            <option value="as">অসমীয়া (Assamese)</option>
            <option value="bn">বাংলা (Bengali)</option>
            <option value="brx">बोडो (Bodo)</option>
            <option value="doi">डोगरी (Dogri)</option>
            <option value="gu">ગુજરાતી (Gujarati)</option>
            <option value="hi">हिन्दी (Hindi)</option>
            <option value="kn">ಕನ್ನಡ (Kannada)</option>
            <option value="ks">کأشُر (Kashmiri)</option>
            <option value="kok">कोंकणी (Konkani)</option>
            <option value="mai">मैथिली (Maithili)</option>
            <option value="ml">മലയാളം (Malayalam)</option>
            <option value="mni">মৈতেইলোন (Manipuri)</option>
            <option value="mr">मराठी (Marathi)</option>
            <option value="ne">नेपाली (Nepali)</option>
            <option value="or">ଓଡ଼ିଆ (Odia)</option>
            <option value="pa">ਪੰਜਾਬੀ (Punjabi)</option>
            <option value="sa">संस्कृतम् (Sanskrit)</option>
            <option value="sat">संताली (Santali)</option>
            <option value="sd">सिन्धी (Sindhi)</option>
            <option value="ta">தமிழ் (Tamil)</option>
            <option value="te">తెలుగు (Telugu)</option>
            <option value="ur">اردو (Urdu)</option>
          </select>
        </div>
      </header>

      <main id="home" class="hero-section" role="main">
        <div class="chat-container-main fade-in">
          <div class="chat-welcome" id="chat-welcome" aria-labelledby="dynamic-greeting">
            <h1 class="welcome-title" id="dynamic-greeting">What can I help with?</h1>
            <p class="welcome-subtitle" id="dynamic-subtitle">Understand the election process, timelines &amp; steps — ask in any language 🇮🇳</p>
          </div>

          <div class="chat-messages" id="chat-messages" aria-live="polite" aria-relevant="additions" role="log">
            <!-- Messages will appear here -->
          </div>
          
          <div class="ai-input-wrapper">
            <div class="welcome-suggestions-row" id="dynamic-suggestions-container" role="list">
              <!-- Dynamically injected by main.js -->
            </div>

            <div class="input-container-floating" id="input-pill">
              <div class="input-actions-left">
                <button id="new-chat-plus" class="action-btn plus-btn" onclick="clearChat()" title="New Chat" aria-label="Clear chat and start new session">
                  <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
                    <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"></path>
                  </svg>
                </button>
              </div>
              <textarea id="user-input" placeholder="Ask about elections, voting, timelines..." rows="1" aria-label="Type your election query here"></textarea>
              <div class="input-actions-right">
                <button id="mic-btn" class="action-btn mic-btn" aria-label="Start voice input" title="Speak your question">
                  <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                    <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"></path>
                    <path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"></path>
                  </svg>
                </button>
                <button id="send-msg" class="send-btn-round" aria-label="Send query">
                  <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
                    <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                  </svg>
                </button>
              </div>
            </div>

            <div class="input-footer-minimal">
              <span>Verified by Election Commission of India · Ask in any language</span>
            </div>
          </div>
        </div>

        <div id="record-overlay" class="record-overlay hidden" role="dialog" aria-modal="true" aria-label="Voice recording in progress">
          <div class="record-content">
            <div class="record-pulse" aria-hidden="true"></div>
            <p>Listening...</p>
            <button id="stop-record" class="stop-record-btn" aria-label="Stop recording and process">Done</button>
          </div>
        </div>
      </main>

      <footer class="footer" role="contentinfo">
        <div class="footer-content">
          <p>Built with ❤️ by <strong>Subhajit</strong> for <strong>H2S Virtual: PromptWars Challenge 2</strong> | Election Process Education</p>
        </div>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="/main.js"></script>
  </body>
</html>
